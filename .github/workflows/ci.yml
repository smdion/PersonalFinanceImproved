name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Check file sizes
        run: bash scripts/check-file-size.sh

      - name: Check migrations
        run: pnpm check:migrations
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          NEXTAUTH_SECRET: build-placeholder-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"
          AUTH_AUTHENTIK_ISSUER: https://build-placeholder/application/o/ledgr/
          AUTH_AUTHENTIK_ID: build-placeholder
          AUTH_AUTHENTIK_SECRET: build-placeholder

      - name: Test
        run: npx vitest run

      - name: Verify docs freshness
        run: pnpm docs:verify
        continue-on-error: true

      - name: Audit dependencies (high/critical)
        run: pnpm audit --audit-level=high
        continue-on-error: true # Known vulns in next@14/eslint@8 transitive deps — tracked in TODO.md

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          CI: true
