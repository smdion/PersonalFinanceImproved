name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # --- Blocking steps (fail the pipeline) ---

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Check file sizes
        run: bash scripts/check-file-size.sh

      - name: Cache Next.js build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          NEXTAUTH_SECRET: build-placeholder-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"
          AUTH_AUTHENTIK_ISSUER: https://build-placeholder/application/o/ledgr/
          AUTH_AUTHENTIK_ID: build-placeholder
          AUTH_AUTHENTIK_SECRET: build-placeholder

      - name: Test with coverage thresholds
        run: pnpm test:coverage

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: E2E tests (SQLite + demo mode)
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true
          # Write .env for the standalone server (reads dotenv, not shell env).
          # Values here must match the step env: block — single source of truth.
          printf 'SQLITE_PATH=%s\nDEMO_ONLY=%s\nNEXTAUTH_SECRET=%s\nNEXTAUTH_URL=%s\nAUTH_TRUST_HOST=%s\n' \
            "$SQLITE_PATH" "$DEMO_ONLY" "$NEXTAUTH_SECRET" "$NEXTAUTH_URL" "$AUTH_TRUST_HOST" \
            > .next/standalone/.env
          pnpm db:migrate
          pnpm run test:e2e
        env:
          CI: true
          DEMO_ONLY: "true"
          SQLITE_PATH: ${{ github.workspace }}/data/ledgr.db
          NEXTAUTH_SECRET: e2e-placeholder-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Audit production dependencies (high/critical)
        run: pnpm audit --prod --audit-level=high

      - name: Check migrations
        run: pnpm check:migrations

      - name: Verify docs freshness
        run: pnpm docs:verify

      - name: Docker build smoke test
        if: github.event_name == 'push'
        run: docker build --build-arg APP_VERSION=ci-${{ github.sha }} -t ledgr:ci-test .

      - name: Notify on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          echo "::warning::CI failed on main — check ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
