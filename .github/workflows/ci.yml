name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # --- Blocking steps (fail the pipeline) ---

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Check file sizes
        run: bash scripts/check-file-size.sh

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          NEXTAUTH_SECRET: build-placeholder-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"
          AUTH_AUTHENTIK_ISSUER: https://build-placeholder/application/o/ledgr/
          AUTH_AUTHENTIK_ID: build-placeholder
          AUTH_AUTHENTIK_SECRET: build-placeholder

      - name: Test with coverage thresholds
        run: pnpm test:coverage

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (SQLite + demo mode)
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true
          # Write .env for the standalone server (reads dotenv, not shell env).
          # Values here must match the step env: block — single source of truth.
          printf 'SQLITE_PATH=%s\nDEMO_ONLY=%s\nNEXTAUTH_SECRET=%s\nNEXTAUTH_URL=%s\nAUTH_TRUST_HOST=%s\n' \
            "$SQLITE_PATH" "$DEMO_ONLY" "$NEXTAUTH_SECRET" "$NEXTAUTH_URL" "$AUTH_TRUST_HOST" \
            > .next/standalone/.env
          pnpm db:migrate
          pnpm run test:e2e
        env:
          CI: true
          DEMO_ONLY: "true"
          SQLITE_PATH: ${{ github.workspace }}/data/ledgr.db
          NEXTAUTH_SECRET: e2e-placeholder-secret-at-least-32-chars
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # --- Non-blocking steps (tracked, don't fail the pipeline) ---

      - name: Audit production dependencies (high/critical)
        if: success()
        id: audit
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Check migrations
        if: success()
        id: check_migrations
        run: pnpm check:migrations
        continue-on-error: true

      - name: Verify docs freshness
        if: success()
        id: docs_verify
        run: pnpm docs:verify
        continue-on-error: true

      - name: Docker build smoke test
        if: success()
        id: docker_build
        run: docker build --build-arg APP_VERSION=ci-${{ github.sha }} -t ledgr:ci-test .
        continue-on-error: true

      # --- Summary of non-blocking issues ---

      - name: CI health summary
        if: always()
        run: |
          {
            echo "## CI Health Summary"
            echo ""
            echo "| Check | Status | Details |"
            echo "|-------|--------|---------|"

            # Audit
            if [ "${{ steps.audit.outcome }}" = "success" ]; then
              echo "| Dependency audit | :white_check_mark: | Passed |"
            elif [ "${{ steps.audit.outcome }}" = "skipped" ]; then
              echo "| Dependency audit | :fast_forward: | Skipped (prior failure) |"
            else
              echo "| Dependency audit | :warning: | Vulnerabilities found |"
            fi

            # Migrations
            if [ "${{ steps.check_migrations.outcome }}" = "success" ]; then
              echo "| Migration check | :white_check_mark: | Passed |"
            elif [ "${{ steps.check_migrations.outcome }}" = "skipped" ]; then
              echo "| Migration check | :fast_forward: | Skipped (prior failure) |"
            else
              echo "| Migration check | :warning: | Needs attention |"
            fi

            # Docs
            if [ "${{ steps.docs_verify.outcome }}" = "success" ]; then
              echo "| Docs freshness | :white_check_mark: | Up to date |"
            elif [ "${{ steps.docs_verify.outcome }}" = "skipped" ]; then
              echo "| Docs freshness | :fast_forward: | Skipped (prior failure) |"
            else
              echo "| Docs freshness | :warning: | Stale docs detected |"
            fi

            # Docker build
            if [ "${{ steps.docker_build.outcome }}" = "success" ]; then
              echo "| Docker build | :white_check_mark: | Image builds |"
            elif [ "${{ steps.docker_build.outcome }}" = "skipped" ]; then
              echo "| Docker build | :fast_forward: | Skipped (prior failure) |"
            else
              echo "| Docker build | :warning: | Build failed |"
            fi

            echo ""
            echo "*Non-blocking issues are tracked in TODO.md and reviewed quarterly.*"
          } >> "$GITHUB_STEP_SUMMARY"
