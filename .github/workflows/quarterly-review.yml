name: Quarterly Review

on:
  schedule:
    # First Monday of Jan, Apr, Jul, Oct at 9am UTC
    - cron: "0 9 1-7 1,4,7,10 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Collect review data
        id: data
        run: |
          # File size check
          SIZE_OUTPUT=$(bash scripts/check-file-size.sh 2>&1 || true)
          EXEMPT_FILES=$(grep -v '^#' .size-exempt | grep -v '^$' | sed 's/^/- `/' | sed 's/$/`/')

          # Pending major dependabot PRs
          MAJOR_PRS=$(gh pr list --state open --label "dependencies" --json title,url \
            --jq '.[] | "- [\(.title)](\(.url))"' 2>/dev/null || echo "- _(unable to fetch)_")

          # Lint warnings count and breakdown
          LINT_OUTPUT=$(npx next lint 2>&1 || true)
          LINT_COUNT=$(echo "$LINT_OUTPUT" | grep -c "Warning" || echo "0")
          LINT_BREAKDOWN=$(echo "$LINT_OUTPUT" | grep "Warning" | sed 's/.*Warning: //' | sort | uniq -c | sort -rn | head -10 | sed 's/^/  /')

          # Dependency audit
          AUDIT_OUTPUT=$(pnpm audit --audit-level=high 2>&1 || true)
          AUDIT_SUMMARY=$(echo "$AUDIT_OUTPUT" | grep "vulnerabilities found" || echo "0 vulnerabilities found")

          # Docs freshness
          DOCS_OUTPUT=$(pnpm docs:verify 2>&1 || true)

          # Save to env
          {
            echo "SIZE_OUTPUT<<EOF"
            echo "$SIZE_OUTPUT"
            echo "EOF"
            echo "EXEMPT_FILES<<EOF"
            echo "$EXEMPT_FILES"
            echo "EOF"
            echo "MAJOR_PRS<<EOF"
            echo "$MAJOR_PRS"
            echo "EOF"
            echo "LINT_COUNT<<EOF"
            echo "$LINT_COUNT"
            echo "EOF"
            echo "LINT_BREAKDOWN<<EOF"
            echo "$LINT_BREAKDOWN"
            echo "EOF"
            echo "AUDIT_SUMMARY<<EOF"
            echo "$AUDIT_SUMMARY"
            echo "EOF"
            echo "AUDIT_OUTPUT<<EOF"
            echo "$AUDIT_OUTPUT"
            echo "EOF"
            echo "DOCS_OUTPUT<<EOF"
            echo "$DOCS_OUTPUT"
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create review issue
        run: |
          gh issue create \
            --title "Quarterly review — $(date +%B\ %Y)" \
            --label "maintenance" \
            --body "$(cat <<ISSUE_BODY
          ## Quarterly Review Checklist

          ### File Size Exemptions

          Review \`.size-exempt\` — split files where practical, re-justify the rest.

          **Currently exempt:**
          $EXEMPT_FILES

          <details>
          <summary>Full file size report</summary>

          \`\`\`
          $SIZE_OUTPUT
          \`\`\`
          </details>

          ### ESLint Warnings

          **$LINT_COUNT warnings** across the codebase.

          <details>
          <summary>Warning breakdown (top 10 rules)</summary>

          \`\`\`
          $LINT_BREAKDOWN
          \`\`\`
          </details>

          - [ ] Review top warning categories — fix or suppress with justification
          - [ ] Target: reduce warning count quarter-over-quarter

          ### Dependency Audit

          **$AUDIT_SUMMARY**

          <details>
          <summary>Full audit output</summary>

          \`\`\`
          $AUDIT_OUTPUT
          \`\`\`
          </details>

          - [ ] Address any new high/critical vulnerabilities
          - [ ] Review if deferred major upgrades (Next.js, ESLint, Tailwind) resolve existing vulns

          ### Major Dependency Updates

          Review open dependabot PRs for major version bumps. Test and merge or close with justification.

          $MAJOR_PRS

          ### Docs Freshness

          <details>
          <summary>Docs verification output</summary>

          \`\`\`
          $DOCS_OUTPUT
          \`\`\`
          </details>

          - [ ] Fix any stale auto-generated docs

          ### Housekeeping

          - [ ] Review \`.size-exempt\` files — split or re-justify each entry
          - [ ] Review open major dependency PRs — merge, close, or defer with reason
          - [ ] Check Docker image size (\`docker images ledgr\`) — flag if significantly larger
          - [ ] Review CI pipeline — any steps consistently slow or failing?
          - [ ] Review non-blocking CI steps — are any ready to become blocking?

          ---
          _Auto-generated by the quarterly-review workflow._
          ISSUE_BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
