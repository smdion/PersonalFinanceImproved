# Default: SQLite (no external database required)
# For PostgreSQL, see docker-compose.postgres.yml
services:
  ledgr:
    build: .
    container_name: ledgr
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # No DATABASE_URL = SQLite mode (zero config).
      # Set DATABASE_URL=postgresql://... for PostgreSQL.
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - CRON_SECRET=${CRON_SECRET}
    volumes:
      - ledgr_data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  ledgr_data:
